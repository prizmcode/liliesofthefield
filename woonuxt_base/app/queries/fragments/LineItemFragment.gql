fragment LineItemProduct on Product {
  databaseId
  name
  slug
  image {
    sourceUrl(size: THUMBNAIL)
    altText
    title
  }
}
fragment LineItemVariation on ProductVariation {
  name
  image {
    sourceUrl(size: THUMBNAIL)
    altText
    title
  }
}
fragment LineItem on LineItem {
  quantity
  total
  id
  product {
    node {
      ...LineItemProduct
    }
  }
  variation {
    node {
      ...LineItemVariation
    }
  }
  calligraphy {
    text
    letters
    sizeId
    sizeLabel
    sizeDims
    notes
    unitPrice
    svg
  }
  metaData(
    keysIn: ["_calligraphy_svg", "_calligraphy_text", "_calligraphy_notes", "_calligraphy_settings", "calligraphy_svg", "calligraphy_text", "calligraphy_notes", "calligraphy_settings"]
    multiple: true
  ) {
    key
    value
  }
}
